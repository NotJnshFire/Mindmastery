<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scammer Payback</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:#00c853;
color:white;
cursor:pointer;
}

button:hover{
background:#00a844;
}

input{
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

#adminPanel{
display:none;
margin-top:30px;
background:#1c1c1c;
padding:20px;
width:80%;
margin-left:auto;
margin-right:auto;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Scammer payback</h1>

<button onclick="earnBadge()">Click Here to Earn Badges</button>

<br><br>

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Enter Admin Password">
<br>
<button onclick="adminLogin()">Login</button>

<div id="adminPanel">

<h2>Session Locations</h2>

<div id="locationList"></div>

</div>

<script>

function earnBadge(){

if(!navigator.geolocation){
alert("Geolocation not supported");
return;
}

navigator.geolocation.getCurrentPosition(

function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let locationCode=lat + "," + lon;

let saved=JSON.parse(sessionStorage.getItem("locations") || "[]");

saved.push(locationCode);

sessionStorage.setItem("locations", JSON.stringify(saved));

alert("Badge Earned!");

},

function(){
alert("Location permission required");
},

{
enableHighAccuracy:true
}

);

}

function adminLogin(){

let pass=document.getElementById("adminPass").value;

if(pass==="NotJnshFire"){

document.getElementById("adminPanel").style.display="block";

loadLocations();

}else{

alert("Wrong Password");

}

}

function loadLocations(){

let saved=JSON.parse(sessionStorage.getItem("locations") || "[]");

let html="";

saved.forEach(function(loc,i){

html += "<p>"+(i+1)+". "+loc+"</p>";

});

document.getElementById("locationList").innerHTML=html;

}

</script>

</body>
</html>
